apiVersion: v1
kind: ConfigMap
metadata:
  name: aipub-brewery-web-nginx
  namespace: aipub
  labels:
    app.kubernetes.io/name: aipub-brewery-web
data:
  default.conf: |
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Vite hashed assets — long-term cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /healthz {
            access_log off;
            return 200 "ok";
        }
    }
