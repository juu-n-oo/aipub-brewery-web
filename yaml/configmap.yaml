apiVersion: v1
kind: ConfigMap
metadata:
  name: aipub-brewery-web-nginx
  namespace: aipub
  labels:
    app.kubernetes.io/name: aipub-brewery-web
data:
  default.conf: |
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Vite hashed assets — long-term cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API v1alpha1 → aipub-backend-gateway (auth, k8sproxy)
        location /api/v1alpha1/ {
            proxy_pass http://aipub-backend-gateway:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 600;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }

        # API v1 → aipub-brewery-backend (dockerfiles, builds, registries, volumes)
        location /api/v1/ {
            proxy_pass http://aipub-brewery-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 600;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /healthz {
            access_log off;
            return 200 "ok";
        }
    }
