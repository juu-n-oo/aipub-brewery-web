apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipub-brewery-web
  namespace: aipub
  labels:
    app.kubernetes.io/name: aipub-brewery-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aipub-brewery-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aipub-brewery-web
    spec:
      containers:
        - name: aipub-brewery-web
          image: aipub-harbor.cluster7.idc1.ten1010.io/aipub/brewery-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: aipub-brewery-web-nginx
